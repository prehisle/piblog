name: Build and Deploy Hugo to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# 避免并发部署相互覆盖
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build site with Hugo
        run: hugo --minify

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update Algolia search index
        # Algolia 出问题（应用失效/密钥错/网络）时只让搜索索引不更新，绝不阻断站点部署
        continue-on-error: true
        # App ID / 索引名是公开值，直接内联；仅 Admin Key 走仓库 secret
        env:
          ALGOLIA_APP_ID: ZTQDHM078F
          ALGOLIA_INDEX_NAME: blog.share4y.cn
          ALGOLIA_INDEX_FILE: public/index.json
          ALGOLIA_ADMIN_KEY: ${{ secrets.ALGOLIA_ADMIN_KEY }}
        run: |
          pip install algoliasearch
          python scripts/upload_index_to_algolia.py

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4